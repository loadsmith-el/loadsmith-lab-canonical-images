name: Build & publish images

on:
  push:
    branches: [main]
    paths:
      - "images/**"
      - ".github/workflows/build-images.yml"
  pull_request:
    paths:
      - "images/**"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:
    inputs:
      force_all:
        description: "Rebuild every image regardless of what changed"
        type: boolean
        default: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed image directories
        if: github.event_name != 'workflow_dispatch' || inputs.force_all != true
        id: changed
        uses: tj-actions/changed-files@v45
        with:
          files: images/**
          dir_names: true
          dir_names_max_depth: 2

      - name: Build matrix
        id: set-matrix
        run: |
          force_all="${{ github.event_name == 'workflow_dispatch' && inputs.force_all }}"
          if [ "$force_all" = "true" ] || ! git rev-parse HEAD^ >/dev/null 2>&1; then
            # No parent commit (initial commit) means there's nothing to diff
            # against — fall back to building every image, same as force_all.
            images=$(find images -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)
          else
            images=$(echo "${{ steps.changed.outputs.all_changed_files }}" \
              | tr ' ' '\n' | sed 's|^images/||' | grep -v '^$' | sort -u)
          fi

          if [ -z "$images" ]; then
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            matrix=$(printf '%s\n' "$images" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute tags
        id: vars
        run: |
          repo="ghcr.io/loadsmith-el/${{ matrix.image }}"
          sha_short="${GITHUB_SHA::7}"

          # Each image declares its own version string (free text, prefix
          # included) in images/<name>/VERSION — e.g. postgres-15 ships
          # "data-v1" (the baked-in canonical-data ref), a future engine image
          # would ship "v0.3.0". The CI doesn't interpret it, just tags with it.
          version=$(cat "images/${{ matrix.image }}/VERSION" 2>/dev/null \
            | head -n1 | tr -d '[:space:]' || true)

          {
            echo "tags<<EOF"
            echo "${repo}:latest"
            echo "${repo}:sha-${sha_short}"
            if [ -n "$version" ]; then echo "${repo}:${version}"; fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: images/${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.vars.outputs.tags }}
