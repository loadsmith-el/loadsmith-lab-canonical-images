# stunnel terminates TLS in front of Oracle's plaintext TNS listener so the lab
# can exercise the connector's rustls TLS path (TCPS) without an Oracle wallet.
# See README.md § TLS for why this is stunnel and not native Oracle TCPS.
#
# Daemonizes (foreground = no) so the gvenzl start-up hook that launches it
# returns and the container finishes booting. Logs go to stderr → docker logs.
foreground = no
pid = /tmp/stunnel-oracle.pid
output = /dev/stderr
debug = 4

[oracle-tcps]
accept = 0.0.0.0:2484
connect = 127.0.0.1:1521
cert = /etc/stunnel/server.pem
